apis:
  - aid: data-spatialhub-scot:catalog
    name: Spatial Hub Scotland CKAN Action API
    description: >-
      CKAN Action API for Spatial Hub Scotland, a consistent JSON-over-HTTP interface over a catalog of 496 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://data.spatialhub.scot/api/3/action/.
    humanURL: https://data.spatialhub.scot
