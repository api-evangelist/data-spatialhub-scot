aid: data-spatialhub-scot
name: Spatial Hub Scotland
description: >-
  Spatial Hub Scotland is a regional government open-data portal for United Kingdom running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 496 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
